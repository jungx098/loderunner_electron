name: Build and Test

on:
  push:
    branches: [ main, master, develop, ci ]
  pull_request:
    branches: [ main, master, develop, ci ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test
      continue-on-error: true  # Since test is not implemented yet

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm install

    - name: List files before build
      run: |
        echo "Current directory contents:"
        ls -la
        echo "LodeRunner_TotalRecall contents:"
        ls -la LodeRunner_TotalRecall || true
      shell: bash

    - name: Build for ${{ matrix.platform }}
      run: npm run build -- --${{ matrix.platform }} --publish never

    - name: List files after build
      run: |
        echo "Dist directory contents:"
        ls -la dist || true
        echo "Build output structure:"
        find dist -type f | head -20 || true
        echo "resources contents after build:"
        find dist/win-unpacked/resources -type f | head -20 || true
        echo "LodeRunner_TotalRecall contents after build:"
        find dist/win-unpacked/resources/LodeRunner_TotalRecall -type f | head -20 || true
      shell: bash

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: loderunner-${{ matrix.platform }}-${{ github.sha }}
        path: dist/*
        retention-days: 7
